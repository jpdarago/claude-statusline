name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv
        run: nix profile install --accept-flake-config github:cachix/devenv/latest

      - name: Build
        run: devenv shell -- go build ./...

      - name: Test
        run: devenv shell -- go test -race -coverprofile=coverage.out ./...

      - name: Vet
        run: devenv shell -- go vet ./...
